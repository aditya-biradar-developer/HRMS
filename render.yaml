services:
  - type: web
    name: hrms-ai-service
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd ai-service && pip install -r requirements.txt
    startCommand: cd ai-service && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.12

  - type: web
    name: hrms-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://hrms-frontend.onrender.com

  - type: web
    name: hrms-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      cd frontend
      export VITE_API_URL=https://hrms-backend-c0ca.onrender.com/api
      export VITE_AI_SERVICE_URL=https://hrms-ai-service.onrender.com
      npm install
      npm run build
      ls -la dist/
    startCommand: cd frontend && NODE_ENV=production npm start
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://hrms-backend-c0ca.onrender.com/api
      - key: VITE_AI_SERVICE_URL
        value: https://hrms-ai-service.onrender.com